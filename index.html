    :root {

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Grain overlay */

<script type="text/babel">
const { useEffect, useRef, useState } = React;

/* ─── CURSOR ─── */
(function() {
  const el = document.getElementById('cursor');
  let mx = -100, my = -100;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    el.style.left = mx + 'px';
    el.style.top  = my + 'px';
  });
  document.addEventListener('mouseleave', () => { el.style.opacity = '0'; });
  document.addEventListener('mouseenter', () => { el.style.opacity = '1'; });
  document.addEventListener('mouseover', e => {
    const t = e.target.closest('[data-hover], a, button, input');
    el.classList.toggle('hover', !!t);
  });
})();

/* ─── INFINITE FIELD (neural mesh canvas) ─── */
function InfiniteField() {
  const canvasRef = useRef(null);
  const rafRef = useRef(0);
  const mouseRef = useRef({ x: -9999, y: -9999, active: false });
  const scrollRef = useRef(0);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let w = 0, h = 0;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    let nodes = [];
    const COLORS = ['#89E900', '#00FF88', '#3DF2E0'];

    function resize() {
      w = canvas.clientWidth;
      h = canvas.clientHeight;
      canvas.width  = w * dpr;
      canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      initNodes();
    }

    function initNodes() {
      const count = Math.min(60, Math.max(24, Math.floor((w * h) / 32000)));
      nodes = Array.from({ length: count }, (_, i) => ({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - .5) * .10,
        vy: (Math.random() - .5) * .10,
        r: Math.random() * 1.6 + .6,
        c: COLORS[i % COLORS.length],
        phase: Math.random() * Math.PI * 2,
      }));
    }

    function step(t) {
      ctx.clearRect(0, 0, w, h);
      const mouse  = mouseRef.current;
      const scroll = scrollRef.current;

      for (const n of nodes) {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < -20) n.x = w + 20;
        if (n.x > w + 20) n.x = -20;
        if (n.y < -20) n.y = h + 20;
        if (n.y > h + 20) n.y = -20;

        if (mouse.active) {
          const dx = mouse.x - n.x, dy = mouse.y - n.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < 30000) {
            const f = .00004 * (1 - d2 / 30000);
            n.vx += dx * f; n.vy += dy * f;
          }
        }
        n.vx *= .992; n.vy *= .992;
        if (Math.abs(n.vx) < .015) n.vx += (Math.random() - .5) * .008;
        if (Math.abs(n.vy) < .015) n.vy += (Math.random() - .5) * .008;
      }

      const LINK = 130;
      ctx.lineWidth = 1;
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < LINK * LINK) {
            const alpha = (1 - Math.sqrt(d2) / LINK) * .35;
            ctx.strokeStyle = `rgba(61,242,224,${alpha})`;
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
          }
        }
      }

      if (mouse.active) {
        for (const n of nodes) {
          const dx = mouse.x - n.x, dy = mouse.y - n.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < 180 * 180) {
            const alpha = (1 - Math.sqrt(d2) / 180) * .8;
            ctx.strokeStyle = `rgba(137,233,0,${alpha})`;
            ctx.lineWidth = 1.2;
            ctx.beginPath(); ctx.moveTo(mouse.x, mouse.y); ctx.lineTo(n.x, n.y); ctx.stroke();
          }
        }
      }

      for (const n of nodes) {
        const pulse = .7 + .3 * Math.sin(t * .002 + n.phase);
        ctx.fillStyle = n.c;
        ctx.globalAlpha = .85 * pulse;
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = .12 * pulse;
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r * 5, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      rafRef.current = requestAnimationFrame(step);
    }

    function onMove(e) {
      const r = canvas.getBoundingClientRect();
      mouseRef.current = { x: e.clientX - r.left, y: e.clientY - r.top, active: true };
    }
    function onLeave() { mouseRef.current.active = false; }
    function onScroll() { scrollRef.current = window.scrollY; }

    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseleave', onLeave);
    window.addEventListener('scroll', onScroll, { passive: true });
    rafRef.current = requestAnimationFrame(step);

    return () => {
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener('resize', resize);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseleave', onLeave);
      window.removeEventListener('scroll', onScroll);
    };
  }, []);

  return (
    <canvas ref={canvasRef} style={{
      position: 'fixed', inset: 0, width: '100vw', height: '100vh',
      zIndex: 0, pointerEvents: 'none',
    }} />
  );
}

/* ─── SCRAMBLE UTILITY ─── */
const SCRAMBLE_CHARS = '!<>-_\\/[]{}=+*^?#▓▒░█01IA';

function scramble(el, finalText, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const queue = Array.from(finalText).map((to, i) => ({
        to,
        start: Math.floor(Math.random() * 20),
        end: Math.floor(Math.random() * 30) + 20 + i * 2,
        ch: '',
      }));
      let frame = 0;
      function tick() {
        let out = '', done = 0;
        for (const q of queue) {
          if (frame >= q.end) { out += q.to; done++; }
          else if (frame >= q.start) {
            if (!q.ch || Math.random() < .3)
              q.ch = SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
            out += `<span style="color:var(--green);opacity:.7">${q.ch}</span>`;
          } else { out += `<span style="opacity:.2">${q.to}</span>`; }
        }
        el.innerHTML = out;
        if (done === queue.length) { el.innerHTML = finalText; resolve(); return; }
        frame++;
        requestAnimationFrame(tick);
      }
      tick();
    }, delay);
  });
}

/* ─── SHARED HOOK ─── */
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: .15 });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}

        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--mint)', boxShadow: '0 0 8px var(--mint)' }} />

/* ─── HERO ─── */
const CYCLE_WORDS = ['IA.', 'Agentes.', 'Modelos.', 'Dados.', 'Futuro.'];

function Hero() {
  const [scroll, setScroll] = useState(0);
  const line1Ref = useRef(null);
  const line2Ref = useRef(null);
  const line3Ref = useRef(null);
  const cycleRef = useRef(null);
  const cycleIdx = useRef(0);
  const running = useRef(false);

  useEffect(() => {
    const fn = () => setScroll(window.scrollY);
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);

  useEffect(() => {
    scramble(line1Ref.current, 'Possibilidades', 200);
    scramble(line2Ref.current, 'infinitas', 500);
    scramble(line3Ref.current, 'através de', 800);

    const start = setTimeout(async () => {
      if (running.current) return;
      running.current = true;
      const el = cycleRef.current;
      if (!el) return;
      await scramble(el, CYCLE_WORDS[0], 0);
      while (true) {
        await new Promise(r => setTimeout(r, 2400));
        cycleIdx.current = (cycleIdx.current + 1) % CYCLE_WORDS.length;
        await scramble(el, CYCLE_WORDS[cycleIdx.current], 0);
      }
    }, 1200);
    return () => clearTimeout(start);
  }, []);

  const t = Math.min(scroll / 600, 1);

  return (
    <section style={{
      position: 'relative', minHeight: '100vh',
      padding: '120px 36px 60px',
      display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
      zIndex: 2,
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: 'JetBrains Mono', fontSize: 11, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--muted)', opacity: 1 - t * 1.5 }}>
        <div style={{ display: 'flex', gap: 28 }}>
          <span>N° 001 — PORTFÓLIO 2026</span>
          <span style={{ color: 'var(--cyan)' }}>◆ INTELIGÊNCIA ARTIFICIAL APLICADA</span>
        </div>
        <div style={{ color: 'var(--green)' }}>ROLE PARA COMEÇAR ↓</div>
      </div>

      <div style={{
        fontFamily: 'Fraunces', fontWeight: 300,
        fontSize: 'clamp(56px, 11.5vw, 200px)',
        lineHeight: .92, letterSpacing: '-.03em',
        padding: '20px 0',
        transform: `translateY(${t * -80}px)`,
        opacity: 1 - t * 1.2,
        color: 'var(--ink)',
      }}>
        <div ref={line1Ref}>Possibilidades</div>
        <div ref={line2Ref}>infinitas</div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: '0.25em', flexWrap: 'wrap' }}>
          <span ref={line3Ref}>através de</span>
          <span ref={cycleRef} style={{ color: 'var(--green)', display: 'inline-block', minWidth: '3ch' }}>IA.</span>
        </div>
      </div>

      <div style={{
        display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 48, alignItems: 'end',
        opacity: 1 - t * 2,
      }}>
        <p style={{ maxWidth: 520, fontFamily: 'Archivo', fontWeight: 400, fontSize: 16, lineHeight: 1.55, color: 'rgba(242,242,238,0.85)' }}>
          <span style={{ color: 'var(--cyan)' }}>Driks</span> é um estúdio de IA que transforma possibilidades infinitas em soluções concretas — produtos, agentes e sistemas que pensam, aprendem e entregam.
        </p>
        <div style={{ display: 'flex', gap: 32, justifyContent: 'flex-end', fontFamily: 'JetBrains Mono', fontSize: 12, letterSpacing: '.04em', textTransform: 'uppercase', color: 'var(--muted)' }}>
          <div><span style={{ color: 'var(--green)' }}>∞</span> possibilidades</div>
          <div><span style={{ color: 'var(--mint)' }}>24</span> projetos entregues</div>
          <div><span style={{ color: 'var(--cyan)' }}>11</span> clientes ativos</div>
        </div>
      </div>
    </section>
  );
}

/* ─── CONTACT ─── */
function Contact() {
  const ref = useReveal();
  const [email, setEmail] = useState('');
  const [sent, setSent] = useState(false);

  const submit = e => {
    e.preventDefault();
    if (!email.includes('@')) return;
    setSent(true);
    setTimeout(() => setSent(false), 3500);
    setEmail('');
  };

  return (
    <section id="contact" ref={ref} className="reveal" style={{ position: 'relative', padding: '180px 36px 80px', zIndex: 2 }}>
      <div style={{ maxWidth: 1240, margin: '0 auto' }}>
        <div style={{ fontFamily: 'JetBrains Mono', fontSize: 11, letterSpacing: '.12em', textTransform: 'uppercase', color: 'var(--mint)', marginBottom: 24 }}>§ 05 — CONTATO</div>

        <h2 style={{ fontFamily: 'Fraunces', fontWeight: 300, fontSize: 'clamp(44px, 8vw, 128px)', lineHeight: .95, letterSpacing: '-.03em', marginBottom: 72 }}>
          Tem um problema<br />
          <em style={{ fontStyle: 'italic', color: 'var(--green)' }}>que ninguém ainda resolveu?</em>
        </h2>

        <form onSubmit={submit} style={{ marginBottom: 80 }}>
          <div style={{
            display: 'grid', gridTemplateColumns: '120px 1fr 200px',
            borderTop: '1px solid var(--hairline)', borderBottom: '1px solid var(--hairline)',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', fontFamily: 'JetBrains Mono', fontSize: 10, letterSpacing: '.12em', color: 'var(--muted)', paddingLeft: 2 }}>SEU E-MAIL</div>
            <input
              type="email"
              value={email}
              onChange={e => setEmail(e.target.value)}
              placeholder="voce@empresa.com"
              required
              data-hover
              style={{
                background: 'transparent', border: 'none', outline: 'none',
                borderLeft: '1px solid var(--hairline)',
                fontFamily: 'Fraunces', fontWeight: 300, fontSize: 28,
                color: 'var(--ink)', padding: '24px 0 24px 24px',
              }}
            />
            <button
              type="submit"
              data-hover
              style={{
                background: sent ? 'var(--mint)' : 'var(--green)',
                color: 'var(--dark)', border: 'none',
                fontFamily: 'Archivo', fontWeight: 600, fontSize: 14,
                letterSpacing: '.04em', textTransform: 'uppercase',
                padding: '0 28px', transition: 'background .3s',
              }}
            >
              {sent ? '✓  Recebido' : 'Conversar  →'}
            </button>
          </div>
        </form>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 40, borderTop: '1px solid var(--hairline)', paddingTop: 40 }}>
          <a href="mailto:ola@driks.ai" data-hover style={{ display: 'flex', flexDirection: 'column', gap: 8, textTransform: 'uppercase' }}>
            <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'var(--muted)' }}>DIRETO</span>
            <span style={{ fontFamily: 'Fraunces', fontSize: 28, letterSpacing: '-.01em' }}>ola@driks.ai</span>
          </a>
          <a href="#" data-hover style={{ display: 'flex', flexDirection: 'column', gap: 8, textTransform: 'uppercase' }}>
            <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'var(--muted)' }}>AGENDE</span>
            <span style={{ fontFamily: 'Fraunces', fontSize: 28, letterSpacing: '-.01em' }}>Call de 30 min ↗</span>
          </a>
        </div>
      </div>
    </section>
  );
}
